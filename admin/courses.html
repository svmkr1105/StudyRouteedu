<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses – StudyRoute Admin</title>
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            margin-bottom: 16px;
        }
        
        .modal-content .form-group {
            margin-bottom: 14px;
        }
        
        .modal-content .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        
        .modal-content .form-group input,
        .modal-content .form-group textarea,
        .modal-content .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #334155;
        }
        
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block;
        }
    </style>
</head>

<body>
    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <div class="logo">
            <img src="../images/logo.png" alt="StudyRoute" />
            <h2>StudyRoute</h2>
        </div>
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-chart-pie"></i> Dashboard
        </a>
        <a href="colleges.html" class="nav-item">
            <i class="fas fa-building-columns"></i> Colleges
        </a>
        <a href="courses.html" class="nav-item active">
            <i class="fas fa-book-open"></i> Courses
        </a>
        <a href="bscc.html" class="nav-item">
            <i class="fas fa-credit-card"></i> BSCC Courses
        </a>
        <a href="partners.html" class="nav-item">
            <i class="fas fa-users"></i> Partners
        </a>
        <a href="feedback.html" class="nav-item">
            <i class="fas fa-comment"></i> Feedback
        </a>
        <a href="content.html" class="nav-item">
            <i class="fas fa-gear"></i> Content
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-key"></i> Change Password
        </a>
        <a href="index.html" class="nav-item logout" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">
        <div class="header">
            <h1>📚 Course Management</h1>
            <div class="user-info">
                <span id="adminName">Admin</span>
                <button class="btn btn-primary" onclick="openAddModal()">
                    <i class="fas fa-plus"></i> Add Course
                </button>
            </div>
        </div>

        <!-- Search -->
        <div class="table-container">
            <div class="table-header">
                <h3>All Courses</h3>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search courses..." onkeyup="searchCourses()" />
                </div>
            </div>
            <div id="coursesTable">
                <div class="empty-state">
                    <i class="fas fa-book-open"></i>
                    <p>No courses added yet. Click "Add Course" to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal" id="courseModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add Course</h2>
            <form id="courseForm">
                <input type="hidden" id="editId" />
                <div class="form-group">
                    <label>Course Name *</label>
                    <input type="text" id="courseName" required placeholder="e.g. BCA" />
                </div>
                <div class="form-group">
                    <label>Duration *</label>
                    <input type="text" id="courseDuration" required placeholder="e.g. 3 Years" />
                </div>
                <div class="form-group">
                    <label>Eligibility *</label>
                    <input type="text" id="courseEligibility" required placeholder="e.g. 10+2 with 50%" />
                </div>
                <div class="form-group">
                    <label>Fees</label>
                    <input type="text" id="courseFees" placeholder="e.g. ₹50,000/year" />
                </div>
                <div class="form-group">
                    <label>Related College</label>
                    <input type="text" id="courseCollege" placeholder="e.g. Patna University" />
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">💾 Save</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        const token = localStorage.getItem('adminToken');
        let courses = [];
        let editMode = false;

        if (!token) window.location.href = 'index.html';

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = 'index.html';
        }

        // ===== LOAD COURSES =====
        async function loadCourses() {
            try {
                const response = await fetch(`${API_BASE}/courses/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                courses = await response.json();
                renderCourses(courses);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // ===== RENDER COURSES =====
        function renderCourses(data) {
            const container = document.getElementById('coursesTable');
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <p>No courses added yet. Click "Add Course" to get started!</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Course Name</th>
                            <th>Duration</th>
                            <th>Eligibility</th>
                            <th>Fees</th>
                            <th>College</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map((c, i) => `
                            <tr>
                                <td>${i + 1}</td>
                                <td><strong>${c.name}</strong></td>
                                <td>${c.duration}</td>
                                <td>${c.eligibility || 'N/A'}</td>
                                <td>${c.fees || 'N/A'}</td>
                                <td>${c.college_name || 'N/A'}</td>
                                <td>
                                    <button class="btn btn-primary btn-sm" onclick="editCourse('${c.name}')">✏️</button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteCourse('${c.name}')">🗑️</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // ===== SEARCH =====
        function searchCourses() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = courses.filter(c => c.name.toLowerCase().includes(search));
            renderCourses(filtered);
        }

        // ===== OPEN ADD MODAL =====
        function openAddModal() {
            editMode = false;
            document.getElementById('modalTitle').textContent = 'Add Course';
            document.getElementById('courseForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('courseModal').classList.add('show');
        }

        // ===== EDIT COURSE =====
        function editCourse(name) {
            const course = courses.find(c => c.name === name);
            if (!course) return;
            editMode = true;
            document.getElementById('modalTitle').textContent = 'Edit Course';
            document.getElementById('editId').value = course.name;
            document.getElementById('courseName').value = course.name;
            document.getElementById('courseDuration').value = course.duration || '';
            document.getElementById('courseEligibility').value = course.eligibility || '';
            document.getElementById('courseFees').value = course.fees || '';
            document.getElementById('courseCollege').value = course.college_name || '';
            document.getElementById('courseModal').classList.add('show');
        }

        // ===== CLOSE MODAL =====
        function closeModal() {
            document.getElementById('courseModal').classList.remove('show');
        }

        // ===== SAVE COURSE =====
        document.getElementById('courseForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('courseName').value.trim();
            const duration = document.getElementById('courseDuration').value.trim();
            const eligibility = document.getElementById('courseEligibility').value.trim();
            const fees = document.getElementById('courseFees').value.trim();
            const college_name = document.getElementById('courseCollege').value.trim();
            const editId = document.getElementById('editId').value;

            if (!name || !duration || !eligibility) {
                alert('Course Name, Duration and Eligibility are required!');
                return;
            }

            const data = { name, duration, eligibility, fees, college_name };

            try {
                if (editMode) {
                    await fetch(`${API_BASE}/courses/${encodeURIComponent(editId)}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(data)
                    });
                } else {
                    await fetch(`${API_BASE}/courses/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(data)
                    });
                }
                closeModal();
                loadCourses();
            } catch (error) {
                alert('Error saving course');
            }
        });

        // ===== DELETE COURSE =====
        async function deleteCourse(name) {
            if (!confirm(`Delete "${name}"?`)) return;
            try {
                await fetch(`${API_BASE}/courses/${encodeURIComponent(name)}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadCourses();
            } catch (error) {
                alert('Error deleting course');
            }
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', function() {
            const user = localStorage.getItem('adminUser') || 'Admin';
            document.getElementById('adminName').textContent = `👋 ${user}`;
            loadCourses();
        });

        document.getElementById('courseModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        window.openAddModal = openAddModal;
        window.editCourse = editCourse;
        window.deleteCourse = deleteCourse;
        window.searchCourses = searchCourses;
        window.closeModal = closeModal;
    </script>
</body>

</html>
