<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admissions – StudyRoute Admin</title>
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        .badge-new {
            background: #dbeafe;
            color: #1d4ed8;
            padding: 2px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .btn-download {
            background: #16a34a;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-download:hover {
            background: #15803d;
        }
        
        .btn-delete {
            background: #dc2626;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-delete:hover {
            background: #b91c1c;
        }
        
        .btn-view {
            background: #2563eb;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 4px;
        }
        
        .btn-view:hover {
            background: #1d4ed8;
        }
        
        .doc-cell {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        
        .doc-cell .btn-download {
            font-size: 0.6rem;
            padding: 2px 8px;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        
        .no-data i {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
        }
        
        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .filter-bar input {
            padding: 8px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            min-width: 200px;
        }
        
        .filter-bar input:focus {
            outline: none;
            border-color: #2563eb;
        }
        
        .table-wrap {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        
        table th {
            background: #f1f5f9;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
        }
        
        table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        
        table tr:hover {
            background: #f8fafc;
        }
        
        .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .status-badge.approved {
            background: #dcfce7;
            color: #16a34a;
        }
        
        .status-badge.pending {
            background: #fef3c7;
            color: #d97706;
        }
        /* ===== MODAL STYLES ===== */
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            padding: 20px;
        }
        
        .modal-box {
            background: white;
            border-radius: 16px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            background: white;
            border-radius: 16px 16px 0 0;
            z-index: 10;
        }
        
        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #94a3b8;
            padding: 0 8px;
        }
        
        .modal-close:hover {
            color: #dc2626;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .detail-section {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .detail-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .detail-section h3 {
            font-size: 0.95rem;
            font-weight: 700;
            color: #2563eb;
            margin-bottom: 10px;
        }
        
        .detail-section p {
            font-size: 0.85rem;
            color: #334155;
            margin: 4px 0;
        }
        
        .detail-section a {
            color: #2563eb;
            text-decoration: none;
        }
        
        .detail-section a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-bar input {
                width: 100%;
                min-width: unset;
            }
            table {
                font-size: 0.75rem;
            }
            table th,
            table td {
                padding: 6px 8px;
            }
            .modal-box {
                max-width: 100%;
                margin: 10px;
                max-height: 95vh;
            }
            .modal-body {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <div class="logo">
            <img src="../images/logo.png" alt="StudyRoute" />
            <h2>StudyRoute</h2>
        </div>
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-chart-pie"></i> Dashboard
        </a>
        <a href="colleges.html" class="nav-item">
            <i class="fas fa-building-columns"></i> Colleges
        </a>
        <a href="courses.html" class="nav-item">
            <i class="fas fa-book-open"></i> Courses
        </a>
        <a href="bscc.html" class="nav-item">
            <i class="fas fa-credit-card"></i> BSCC Courses
        </a>
        <a href="partners.html" class="nav-item">
            <i class="fas fa-users"></i> Partners
        </a>
        <a href="feedback.html" class="nav-item">
            <i class="fas fa-comment"></i> Feedback
        </a>
        <a href="admissions.html" class="nav-item active">
            <i class="fas fa-pen-to-square"></i> Admissions
        </a>
        <a href="content.html" class="nav-item">
            <i class="fas fa-gear"></i> Content
        </a>
        <a href="index.html" class="nav-item logout" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">
        <div class="header">
            <h1>📋 Admission Applications</h1>
            <div class="user-info">
                <span id="adminName">Admin</span>
            </div>
        </div>

        <!-- Filter -->
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search by name, course, college..." onkeyup="filterTable()" />
            <span style="font-size:0.85rem; color:#94a3b8;">Total: <span id="totalCount">0</span> entries</span>
        </div>

        <!-- Table -->
        <div class="table-container">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>College</th>
                            <th>Mobile</th>
                            <th>District</th>
                            <th>Date</th>
                            <th>Documents</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admissionsTableBody">
                        <tr>
                            <td colspan="9" class="no-data">
                                <i class="fas fa-spinner fa-spin"></i> Loading admissions...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        const token = localStorage.getItem('adminToken');
        let allAdmissions = [];

        if (!token) window.location.href = 'index.html';

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = 'index.html';
        }

        // ===== LOAD ADMISSIONS =====
        async function loadAdmissions() {
            try {
                const response = await fetch(`${API_BASE}/admissions/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) throw new Error('Failed to load');
                allAdmissions = await response.json();
                renderTable(allAdmissions);
                document.getElementById('totalCount').textContent = allAdmissions.length;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('admissionsTableBody').innerHTML = `
                    <tr><td colspan="9" class="no-data">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        Failed to load admissions. Please refresh.
                    </td></tr>
                `;
            }
        }

        // ===== RENDER TABLE =====
        function renderTable(data) {
            const tbody = document.getElementById('admissionsTableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="9" class="no-data">
                        <i class="fas fa-inbox"></i>
                        No admissions found.
                    </td></tr>
                `;
                return;
            }

            tbody.innerHTML = data.map((ad, index) => {
                const date = ad.submittedAt ? new Date(ad.submittedAt).toLocaleDateString('en-IN') : 'N/A';
                const docFields = [{
                    key: 'photo',
                    label: 'Photo'
                }, {
                    key: 'signature',
                    label: 'Signature'
                }, {
                    key: 'tenthMarksheet',
                    label: '10th'
                }, {
                    key: 'twelfthMarksheet',
                    label: '12th'
                }, {
                    key: 'gradMarksheet',
                    label: 'Graduation'
                }, {
                    key: 'aadhar',
                    label: 'Aadhar'
                }, {
                    key: 'residentialCert',
                    label: 'Residential'
                }, {
                    key: 'casteCert',
                    label: 'Caste'
                }];

                // ✅ DOWNLOAD BUTTONS AS DIRECT LINKS
                const docButtons = docFields
                    .filter(f => ad[f.key])
                    .map(f => {
                        let fileName = ad[f.key].split('/').pop();
                        fileName = fileName.split('\\').pop();
                        return `
                            <a href="${API_BASE}/download/${encodeURIComponent(fileName)}" 
                               target="_blank" 
                               class="btn-download" 
                               style="text-decoration:none; display:inline-block; padding:2px 10px; background:#16a34a; color:white; border-radius:4px; font-size:0.6rem; margin:1px;">
                                ${f.label}
                            </a>
                        `;
                    }).join('');

                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${ad.fullName || 'N/A'}</strong></td>
                        <td>${ad.preferredCourse || 'N/A'}</td>
                        <td>${ad.preferredCollege || 'N/A'}</td>
                        <td>${ad.mobile || 'N/A'}</td>
                        <td>${ad.district || 'N/A'}</td>
                        <td>${date}</td>
                        <td>
                            <div class="doc-cell">
                                ${docButtons || '<span style="color:#94a3b8;font-size:0.7rem;">No docs</span>'}
                            </div>
                        </td>
                        <td>
                            <button class="btn-view" onclick="viewDetails('${ad._id}')">
                                <i class="fas fa-eye"></i> View
                            </button>
                            <button class="btn-delete" onclick="deleteAdmission('${ad._id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ===== VIEW DETAILS =====
        function viewDetails(id) {
            const admission = allAdmissions.find(ad => ad._id === id);
            if (!admission) {
                alert('Admission not found');
                return;
            }

            const modalContent = `
                <div class="modal-overlay" onclick="closeModal(event)">
                    <div class="modal-box">
                        <div class="modal-header">
                            <h2>📋 Admission Details</h2>
                            <button class="modal-close" onclick="closeModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="detail-section">
                                <h3>👤 Personal Information</h3>
                                <p><strong>Name:</strong> ${admission.fullName || 'N/A'}</p>
                                <p><strong>Father's Name:</strong> ${admission.fatherName || 'N/A'}</p>
                                <p><strong>Mother's Name:</strong> ${admission.motherName || 'N/A'}</p>
                                <p><strong>DOB:</strong> ${admission.dob || 'N/A'}</p>
                                <p><strong>Gender:</strong> ${admission.gender || 'N/A'}</p>
                                <p><strong>Mobile:</strong> ${admission.mobile || 'N/A'}</p>
                                <p><strong>Alternate Mobile:</strong> ${admission.altMobile || 'N/A'}</p>
                                <p><strong>Email:</strong> ${admission.email || 'N/A'}</p>
                            </div>
                            
                            <div class="detail-section">
                                <h3>📍 Address Details</h3>
                                <p><strong>Address:</strong> ${admission.address || 'N/A'}</p>
                                <p><strong>Block:</strong> ${admission.block || 'N/A'}</p>
                                <p><strong>District:</strong> ${admission.district || 'N/A'}</p>
                                <p><strong>State:</strong> ${admission.state || 'N/A'}</p>
                                <p><strong>Pin Code:</strong> ${admission.pincode || 'N/A'}</p>
                            </div>
                            
                            <div class="detail-section">
                                <h3>📚 Academic Details</h3>
                                <p><strong>10th Year:</strong> ${admission.tenthYear || 'N/A'}</p>
                                <p><strong>10th %:</strong> ${admission.tenthPercent || 'N/A'}</p>
                                <p><strong>12th Year:</strong> ${admission.twelfthYear || 'N/A'}</p>
                                <p><strong>12th %:</strong> ${admission.twelfthPercent || 'N/A'}</p>
                                <p><strong>12th Stream:</strong> ${admission.twelfthStream || 'N/A'}</p>
                                <p><strong>Graduation Year:</strong> ${admission.gradYear || 'N/A'}</p>
                                <p><strong>Graduation %:</strong> ${admission.gradPercent || 'N/A'}</p>
                                <p><strong>Graduation Stream:</strong> ${admission.gradStream || 'N/A'}</p>
                            </div>
                            
                            <div class="detail-section">
                                <h3>🎯 Course & College</h3>
                                <p><strong>Preferred Course:</strong> ${admission.preferredCourse || 'N/A'}</p>
                                <p><strong>Preferred College:</strong> ${admission.preferredCollege || 'N/A'}</p>
                                <p><strong>BSCC Interest:</strong> ${admission.bsccInterest || 'N/A'}</p>
                            </div>
                            
                            <div class="detail-section">
                                <h3>📎 Documents</h3>
                                ${admission.photo ? `<p><strong>Photo:</strong> <a href="${API_BASE}/download/${admission.photo.split('/').pop().split('\\').pop()}" target="_blank">Download</a></p>` : ''}
                                ${admission.signature ? `<p><strong>Signature:</strong> <a href="${API_BASE}/download/${admission.signature.split('/').pop().split('\\').pop()}" target="_blank">Download</a></p>` : ''}
                                ${admission.tenthMarksheet ? `<p><strong>10th Marksheet:</strong> <a href="${API_BASE}/download/${admission.tenthMarksheet.split('/').pop().split('\\').pop()}" target="_blank">Download</a></p>` : ''}
                                ${admission.twelfthMarksheet ? `<p><strong>12th Marksheet:</strong> <a href="${API_BASE}/download/${admission.twelfthMarksheet.split('/').pop().split('\\').pop()}" target="_blank">Download</a></p>` : ''}
                                ${admission.gradMarksheet ? `<p><strong>Graduation Marksheet:</strong> <a href="${API_BASE}/download/${admission.gradMarksheet.split('/').pop().split('\\').pop()}" target="_blank">Download</a></p>` : ''}
                                ${admission.aadhar ? `<p><strong>Aadhar:</strong> <a href="${API_BASE}/download/${admission.aadhar.split('/').pop().split('\\').pop()}" target="_blank">Download</a></p>` : ''}
                                ${admission.residentialCert ? `<p><strong>Residential Certificate:</strong> <a href="${API_BASE}/download/${admission.residentialCert.split('/').pop().split('\\').pop()}" target="_blank">Download</a></p>` : ''}
                                ${admission.casteCert ? `<p><strong>Caste Certificate:</strong> <a href="${API_BASE}/download/${admission.casteCert.split('/').pop().split('\\').pop()}" target="_blank">Download</a></p>` : ''}
                            </div>
                            
                            <div class="detail-section">
                                <h3>📝 Referral</h3>
                                <p><strong>Source:</strong> ${admission.referralSource || 'N/A'}</p>
                                <p><strong>Referrer:</strong> ${admission.referrerName || 'N/A'}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const existingModal = document.querySelector('.modal-overlay');
            if (existingModal) existingModal.remove();
            document.body.insertAdjacentHTML('beforeend', modalContent);
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            const modal = document.querySelector('.modal-overlay');
            if (modal) {
                modal.remove();
                document.body.style.overflow = 'auto';
            }
        }

        // ===== DELETE ADMISSION =====
        async function deleteAdmission(id) {
            if (!confirm('Are you sure you want to delete this admission entry?')) return;
            try {
                const response = await fetch(`${API_BASE}/admissions/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (response.ok) {
                    alert('✅ Admission deleted successfully!');
                    loadAdmissions();
                } else {
                    const data = await response.json();
                    alert('❌ Failed to delete: ' + (data.detail || 'Unknown error'));
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('❌ Error deleting admission');
            }
        }

        // ===== FILTER TABLE =====
        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                renderTable(allAdmissions);
                return;
            }
            const filtered = allAdmissions.filter(ad =>
                (ad.fullName && ad.fullName.toLowerCase().includes(query)) ||
                (ad.preferredCourse && ad.preferredCourse.toLowerCase().includes(query)) ||
                (ad.preferredCollege && ad.preferredCollege.toLowerCase().includes(query)) ||
                (ad.mobile && ad.mobile.includes(query)) ||
                (ad.district && ad.district.toLowerCase().includes(query))
            );
            renderTable(filtered);
            document.getElementById('totalCount').textContent = filtered.length;
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', function() {
            const user = localStorage.getItem('adminUser') || 'Admin';
            document.getElementById('adminName').textContent = `👋 ${user}`;
            loadAdmissions();
        });

        // Make functions global
        window.viewDetails = viewDetails;
        window.closeModal = closeModal;
        window.deleteAdmission = deleteAdmission;
        window.filterTable = filterTable;
        window.logout = logout;
    </script>

    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>

</html>
