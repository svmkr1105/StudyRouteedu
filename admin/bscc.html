<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSCC Courses – StudyRoute Admin</title>
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            margin-bottom: 16px;
        }
        
        .modal-content .form-group {
            margin-bottom: 14px;
        }
        
        .modal-content .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        
        .modal-content .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #334155;
        }
        
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block;
        }
        
        .badge-bscc {
            background: #dbeafe;
            color: #1d4ed8;
            padding: 2px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <div class="logo">
            <img src="../images/logo.png" alt="StudyRoute" />
            <h2>StudyRoute</h2>
        </div>
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-chart-pie"></i> Dashboard
        </a>
        <a href="colleges.html" class="nav-item">
            <i class="fas fa-building-columns"></i> Colleges
        </a>
        <a href="courses.html" class="nav-item">
            <i class="fas fa-book-open"></i> Courses
        </a>
        <a href="bscc.html" class="nav-item active">
            <i class="fas fa-credit-card"></i> BSCC Courses
        </a>
        <a href="partners.html" class="nav-item">
            <i class="fas fa-users"></i> Partners
        </a>
        <a href="feedback.html" class="nav-item">
            <i class="fas fa-comment"></i> Feedback
        </a>
        <a href="content.html" class="nav-item">
            <i class="fas fa-gear"></i> Content
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-key"></i> Change Password
        </a>
        <a href="index.html" class="nav-item logout" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">
        <div class="header">
            <h1>🎓 BSCC Course Management</h1>
            <div class="user-info">
                <span id="adminName">Admin</span>
                <button class="btn btn-primary" onclick="openAddModal()">
                    <i class="fas fa-plus"></i> Add BSCC Course
                </button>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h3>All BSCC Courses</h3>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchBSCC()" />
                </div>
            </div>
            <div id="bsccTable">
                <div class="empty-state">
                    <i class="fas fa-credit-card"></i>
                    <p>No BSCC courses added yet. Click "Add BSCC Course" to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal" id="bsccModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add BSCC Course</h2>
            <form id="bsccForm">
                <input type="hidden" id="editId" />
                <div class="form-group">
                    <label>Course Name *</label>
                    <input type="text" id="bsccName" required placeholder="e.g. BCA" />
                </div>
                <div class="form-group">
                    <label>College Name *</label>
                    <input type="text" id="bsccCollege" required placeholder="e.g. Patna University" />
                </div>
                <div class="form-group">
                    <label>District *</label>
                    <input type="text" id="bsccDistrict" required placeholder="e.g. Patna" />
                </div>
                <div class="form-group">
                    <label>Eligibility</label>
                    <input type="text" id="bsccEligibility" placeholder="e.g. 10+2 with 50%" />
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" id="bsccDuration" placeholder="e.g. 3 Years" />
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">💾 Save</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        const token = localStorage.getItem('adminToken');
        let bsccList = [];
        let editMode = false;

        if (!token) window.location.href = 'index.html';

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = 'index.html';
        }

        async function loadBSCC() {
            try {
                const response = await fetch(`${API_BASE}/bscc/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                bsccList = await response.json();
                renderBSCC(bsccList);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderBSCC(data) {
            const container = document.getElementById('bsccTable');
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-credit-card"></i>
                        <p>No BSCC courses added yet. Click "Add BSCC Course" to get started!</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Course Name</th>
                            <th>College</th>
                            <th>District</th>
                            <th>Eligibility</th>
                            <th>Duration</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map((c, i) => `
                            <tr>
                                <td>${i + 1}</td>
                                <td><strong>${c.course_name}</strong></td>
                                <td>${c.college_name}</td>
                                <td><span class="badge-bscc">${c.district}</span></td>
                                <td>${c.eligibility || 'N/A'}</td>
                                <td>${c.duration || 'N/A'}</td>
                                <td>
                                    <button class="btn btn-primary btn-sm" onclick="editBSCC('${c.course_name}')">✏️</button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteBSCC('${c.course_name}')">🗑️</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function searchBSCC() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = bsccList.filter(c => 
                c.course_name.toLowerCase().includes(search) ||
                c.college_name.toLowerCase().includes(search)
            );
            renderBSCC(filtered);
        }

        function openAddModal() {
            editMode = false;
            document.getElementById('modalTitle').textContent = 'Add BSCC Course';
            document.getElementById('bsccForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('bsccModal').classList.add('show');
        }

        function editBSCC(name) {
            const bscc = bsccList.find(c => c.course_name === name);
            if (!bscc) return;
            editMode = true;
            document.getElementById('modalTitle').textContent = 'Edit BSCC Course';
            document.getElementById('editId').value = bscc.course_name;
            document.getElementById('bsccName').value = bscc.course_name;
            document.getElementById('bsccCollege').value = bscc.college_name || '';
            document.getElementById('bsccDistrict').value = bscc.district || '';
            document.getElementById('bsccEligibility').value = bscc.eligibility || '';
            document.getElementById('bsccDuration').value = bscc.duration || '';
            document.getElementById('bsccModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('bsccModal').classList.remove('show');
        }

        document.getElementById('bsccForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const course_name = document.getElementById('bsccName').value.trim();
            const college_name = document.getElementById('bsccCollege').value.trim();
            const district = document.getElementById('bsccDistrict').value.trim();
            const eligibility = document.getElementById('bsccEligibility').value.trim();
            const duration = document.getElementById('bsccDuration').value.trim();
            const editId = document.getElementById('editId').value;

            if (!course_name || !college_name || !district) {
                alert('Course Name, College Name and District are required!');
                return;
            }

            const data = { course_name, college_name, district, eligibility, duration };

            try {
                if (editMode) {
                    await fetch(`${API_BASE}/bscc/${encodeURIComponent(editId)}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(data)
                    });
                } else {
                    await fetch(`${API_BASE}/bscc/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(data)
                    });
                }
                closeModal();
                loadBSCC();
            } catch (error) {
                alert('Error saving BSCC course');
            }
        });

        async function deleteBSCC(name) {
            if (!confirm(`Delete "${name}"?`)) return;
            try {
                await fetch(`${API_BASE}/bscc/${encodeURIComponent(name)}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadBSCC();
            } catch (error) {
                alert('Error deleting BSCC course');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const user = localStorage.getItem('adminUser') || 'Admin';
            document.getElementById('adminName').textContent = `👋 ${user}`;
            loadBSCC();
        });

        document.getElementById('bsccModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        window.openAddModal = openAddModal;
        window.editBSCC = editBSCC;
        window.deleteBSCC = deleteBSCC;
        window.searchBSCC = searchBSCC;
        window.closeModal = closeModal;
    </script>
</body>

</html>
