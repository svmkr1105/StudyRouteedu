<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content – StudyRoute Admin</title>
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>

<body>
    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <div class="logo">
            <img src="../images/logo.png" alt="StudyRoute" />
            <h2>StudyRoute</h2>
        </div>
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-chart-pie"></i> Dashboard
        </a>
        <a href="colleges.html" class="nav-item">
            <i class="fas fa-building-columns"></i> Colleges
        </a>
        <a href="courses.html" class="nav-item">
            <i class="fas fa-book-open"></i> Courses
        </a>
        <a href="bscc.html" class="nav-item">
            <i class="fas fa-credit-card"></i> BSCC Courses
        </a>
        <a href="partners.html" class="nav-item">
            <i class="fas fa-users"></i> Partners
        </a>
        <a href="feedback.html" class="nav-item">
            <i class="fas fa-comment"></i> Feedback
        </a>
        <a href="content.html" class="nav-item active">
            <i class="fas fa-gear"></i> Content
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-key"></i> Change Password
        </a>
        <a href="index.html" class="nav-item logout" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">
        <div class="header">
            <h1>⚙️ Content Management</h1>
            <div class="user-info">
                <span id="adminName">Admin</span>
            </div>
        </div>

        <div class="table-container">
            <h3>📝 Update Website Content</h3>
            <form id="contentForm" style="max-width: 600px; padding: 20px 0;">
                <div class="form-group">
                    <label>Google Form Link</label>
                    <input type="url" id="googleFormLink" placeholder="https://docs.google.com/forms/d/..." />
                    <small style="color: #94a3b8;">This link will be used on the Admission page</small>
                </div>
                <button type="submit" class="btn btn-primary">💾 Save Changes</button>
                <div id="contentMessage" style="margin-top: 12px;"></div>
            </form>

            <hr style="margin: 24px 0;" />

            <h3>📋 Current Link</h3>
            <div id="currentContent" style="padding: 16px 0;">
                <p><strong>Google Form:</strong> <span id="currentForm">Loading...</span></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        const token = localStorage.getItem('adminToken');

        if (!token) window.location.href = 'index.html';

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = 'index.html';
        }

        // ===== LOAD CONTENT =====
        async function loadContent() {
            try {
                const response = await fetch(`${API_BASE}/content/`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();

                document.getElementById('googleFormLink').value = data.google_form_link || '';
                document.getElementById('currentForm').textContent = data.google_form_link || 'Not set';
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // ===== SAVE CONTENT =====
        document.getElementById('contentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const google_form_link = document.getElementById('googleFormLink').value.trim();

            if (!google_form_link) {
                document.getElementById('contentMessage').innerHTML =
                    '<div style="color: #dc2626; padding: 8px 12px; background: #fee2e2; border-radius: 8px;">❌ Please enter a Google Form link</div>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/content/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        google_form_link
                    })
                });

                if (response.ok) {
                    document.getElementById('contentMessage').innerHTML =
                        '<div style="color: #16a34a; padding: 8px 12px; background: #dcfce7; border-radius: 8px;">✅ Content updated successfully!</div>';
                    loadContent();
                } else {
                    document.getElementById('contentMessage').innerHTML =
                        '<div style="color: #dc2626; padding: 8px 12px; background: #fee2e2; border-radius: 8px;">❌ Failed to update content</div>';
                }
            } catch (error) {
                document.getElementById('contentMessage').innerHTML =
                    '<div style="color: #dc2626; padding: 8px 12px; background: #fee2e2; border-radius: 8px;">❌ Server error</div>';
            }
        });

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', function() {
            const user = localStorage.getItem('adminUser') || 'Admin';
            document.getElementById('adminName').textContent = `👋 ${user}`;
            loadContent();
        });
    </script>

    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>

</html>
